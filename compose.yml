# =============================================================================
#  #  Rename .env-example to .env and adjust the values before starting.
# =============================================================================

services:

  gitea:
    container_name: gitea
    image: docker.gitea.com/gitea:latest
    user: "${PUID:-0}:${PGID:-0}"
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      - ./gitea:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - nginx_network

  filebrowser:
    container_name: filebrowser
    image: hurlenko/filebrowser
    user: "${PUID:-0}:${PGID:-0}"
    ports:
      - "8181:8080"
    volumes:
      - ${FILEBROWSER_ROOT:-/}:/data
      - ./filebrowser/config:/config
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - nginx_network

  nginxproxymanager:
    container_name: nginxproxymanager
    image: jc21/nginx-proxy-manager:latest
    user: "${PUID:-0}:${PGID:-0}"
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    volumes:
      - ./nginx/data:/data
      - ./nginx/letsencrypt:/etc/letsencrypt
    restart: unless-stopped
    networks:
      - nginx_network

  portainer:
    container_name: portainer
    image: portainer/portainer-ce:latest
    user: "${PUID:-0}:${PGID:-0}"
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./portainer/data:/data
    restart: unless-stopped
    networks:
      - nginx_network

  nextcloud:
    container_name: nextcloud
    image: lscr.io/linuxserver/nextcloud:latest
    user: "${PUID:-0}:${PGID:-0}"
    ports:
      - "8080:80"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Etc/UTC}
    volumes:
      - ./nextcloud/appdata:/config
      - ./nextcloud/data:/data
      - ${PHOTOS_PATH:-/mnt/nvme/Camera Uploads}:/photos
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - nginx_network

  jellyfin:
    container_name: jellyfin
    image: lscr.io/linuxserver/jellyfin:latest
    user: "${PUID:-0}:${PGID:-0}"
    ports:
      - "8096:8096"
      - "8920:8920"
    environment:
      - PUID=${PUID:-0}
      - PGID=${PGID:-0}
      - TZ=${TZ:-Etc/UTC}
    volumes:
      - ./jellyfin/config:/config
      - ${TVSHOWS_PATH:-/mnt/ssd/series}:/data/tvshows
      - ${ANIME_PATH:-/mnt/ssd/anime}:/data/anime
      - ${MOVIES_PATH:-/mnt/nvme/Movies/complete}:/data/movies
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - nginx_network

  navidrome:
    container_name: navidrome
    image: deluan/navidrome:latest
    user: "${PUID:-0}:${PGID:-0}"
    ports:
      - "4533:4533"
    environment:
      ND_SCANSCHEDULE: 1h
      ND_LOGLEVEL: info
      ND_SESSIONTIMEOUT: 24h
    volumes:
      - ./navidrome/data:/data
      - ${MUSIC_PATH:-/mnt/nvme/Zatsando/Music}:/music:ro
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - nginx_network

  audiobookshelf:
    container_name: audiobookshelf
    image: ghcr.io/advplyr/audiobookshelf
    user: "${PUID:-0}:${PGID:-0}"
    ports:
      - "13378:80"
    volumes:
      - ${AUDIOBOOKS_PATH:-/mnt/nvme/Zatsando/AudioBooks}:/audiobooks
      - ./audiobookshelf/podcasts:/podcasts
      - ./audiobookshelf/metadata:/metadata
      - ./audiobookshelf/config:/config
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - nginx_network

  transmission:
    container_name: transmission
    image: lscr.io/linuxserver/transmission:latest
    user: "${PUID:-0}:${PGID:-0}"
    environment:
      - PUID=${PUID:-0}
      - PGID=${PGID:-0}
      - TZ=${TZ:-Etc/UTC}
    ports:
      - "9091:9091"
      - "51413:51413"
      - "51413:51413/udp"
    volumes:
      - ./transmission/data:/config
      - ${DOWNLOADS_PATH:-/mnt/nvme/Downloads}:/downloads
      - ./transmission/watch:/watch
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - nginx_network

  deemix:
    container_name: deemix
    image: ghcr.io/bambanah/deemix:latest
    user: "${PUID:-0}:${PGID:-0}"
    environment:
      - PUID=${PUID:-0}
      - PGID=${PGID:-0}
      - UMASK_SET=022
    ports:
      - "6595:6595"
    volumes:
      - ${MUSIC_PATH:-/mnt/nvme/Zatsando/Music}:/downloads
      - ./deemix/config:/config
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - nginx_network

  pigallery2:
    container_name: pigallery2
    image: bpatrik/pigallery2
    user: "${PUID:-0}:${PGID:-0}"
    ports:
      - "8082:80"
    environment:
      - NODE_ENV=production
    volumes:
      - ${PHOTOS_PATH:-/mnt/nvme/Camera Uploads}:/app/data/photos
      - ./pigallery2/config:/app/data/config
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - nginx_network

  vaultwarden:
    container_name: vaultwarden
    image: vaultwarden/server:latest
    user: "${PUID:-0}:${PGID:-0}"
    ports:
      - "9445:80"
    volumes:
      - ./bitwarden:/data
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - nginx_network

  pinepods-db:
    container_name: pinepods-db
    image: postgres:17
    user: "${PUID:-0}:${PGID:-0}"
    environment:
      POSTGRES_DB: ${PINEPODS_DB_NAME:-pinepods_database}
      POSTGRES_USER: ${PINEPODS_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${PINEPODS_DB_PASSWORD:-changeme}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./pinepods/pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - nginx_network

  pinepods-valkey:
    container_name: pinepods-valkey
    image: valkey/valkey:8-alpine
    user: "${PUID:-0}:${PGID:-0}"
    restart: unless-stopped
    networks:
      - nginx_network

  pinepods:
    container_name: pinepods
    image: madeofpendletonwool/pinepods:latest
    user: "${PUID:-0}:${PGID:-0}"
    ports:
      - "8040:8040"
    environment:
      HOSTNAME: ${PINEPODS_HOSTNAME:-http://localhost:8040}
      SEARCH_API_URL: 'https://search.pinepods.online/api/search'
      PEOPLE_API_URL: 'https://people.pinepods.online'
      DB_TYPE: postgresql
      DB_HOST: pinepods-db
      DB_PORT: 5432
      DB_USER: ${PINEPODS_DB_USER:-postgres}
      DB_PASSWORD: ${PINEPODS_DB_PASSWORD:-changeme}
      DB_NAME: ${PINEPODS_DB_NAME:-pinepods_database}
      VALKEY_HOST: pinepods-valkey
      VALKEY_PORT: 6379
      PUID: ${PUID:-0}
      PGID: ${PGID:-0}
      TZ: ${TZ:-Etc/UTC}
      USERNAME: ${PINEPODS_USERNAME:-admin}
      PASSWORD: ${PINEPODS_PASSWORD:-changeme}
      FULLNAME: ${PINEPODS_FULLNAME:-Admin User}
      EMAIL: ${PINEPODS_EMAIL:-admin@example.com}
    volumes:
      - ./pinepods/downloads:/opt/pinepods/downloads
      - ./pinepods/backups:/opt/pinepods/backups
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - pinepods-db
      - pinepods-valkey
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - nginx_network

  jdownloader-2:
    container_name: jdownloader-2
    image: jlesage/jdownloader-2
    user: "${PUID:-0}:${PGID:-0}"
    ports:
      - "5800:5800"
    volumes:
      - ./jdownloader/config:/config
      - ${DOWNLOADS_PATH:-/mnt/nvme/Downloads}:/output
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - nginx_network

  owncast:
    container_name: owncast
    image: owncast/owncast:latest
    user: "${PUID:-0}:${PGID:-0}"
    ports:
      - "1935:1935"
      - "8083:8080"
    volumes:
      - ./owncast/data:/app/data
    environment:
      - OWNCAST_STREAM_KEY=${OWNCAST_STREAM_KEY:-changeme}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - nginx_network

networks:
  nginx_network:
    driver: bridge
